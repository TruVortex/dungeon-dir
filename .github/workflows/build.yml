name: Build and Package DungeonDir

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: dungeondir-linux
          - os: macos-latest
            artifact_name: dungeondir-macos
          - os: windows-latest
            artifact_name: dungeondir-windows
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --locked
      - name: Build Standalone Executable with Nuitka
        run: uv run nuitka --onefile --output-dir=build --output-filename=dungeondir src/main.py
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/dungeondir.exe
            build/dungeondir.bin
            build/dungeondir
          if-no-files-found: error