name: Build and Release DungeonDir

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: dungeondir-linux
            nuitka_args: --output-filename=dungeondir
            binary_path: dungeondir
          - os: macos-latest
            artifact_name: dungeondir-macos
            nuitka_args: --output-filename=dungeondir
            binary_path: dungeondir
          - os: windows-latest
            artifact_name: dungeondir-windows
            nuitka_args: --output-filename=dungeondir.exe
            binary_path: dungeondir.exe
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --locked
      - name: Build Standalone Executable with Nuitka
        run: |
          uv run nuitka --onefile --remove-output --assume-yes-for-downloads ${{ matrix.nuitka_args }} main.py
      - name: Upload Binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_path }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true # Automatically generates a clean changelog from your commit history