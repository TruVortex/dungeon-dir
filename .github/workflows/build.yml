name: Build and Package DungeonDir

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: dungeondir-linux
            nuitka_args: --output-filename=dungeondir
            binary_path: build/dungeondir
          - os: macos-latest
            artifact_name: dungeondir-macos
            nuitka_args: --output-filename=dungeondir
            binary_path: build/dungeondir
          - os: windows-latest
            artifact_name: dungeondir-windows
            nuitka_args: --output-filename=dungeondir.exe
            binary_path: build/dungeondir.exe
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --locked
      - name: Build Standalone Executable with Nuitka
        run: uv run nuitka --onefile --output-dir=build ${{ matrix.nuitka_args }} main.py
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error